<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO Meta Tags -->
  <title>myMooment – Book Event Vendors & Services Instantly | Coming Soon</title>
  <meta name="description" content="myMooment is India's smartest event booking platform. Discover and book trusted vendors for weddings, parties & corporate events. Launching soon — join the waitlist!" />
  <meta name="keywords" content="event booking, wedding vendors, party planning, event services, book vendors online, myMooment, event management India" />
  <meta name="author" content="myMooment" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://mymooment.com/" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="/mymooment_logo.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/mymooment_logo.png" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mymooment.com/" />
  <meta property="og:title" content="myMooment – Book Event Vendors & Services Instantly" />
  <meta property="og:description" content="India's smartest event booking platform. Discover and book trusted vendors for weddings, parties & corporate events. Launching soon!" />
  <meta property="og:image" content="https://mymooment.com/mymooment_logo.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="myMooment" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://mymooment.com/" />
  <meta name="twitter:title" content="myMooment – Book Event Vendors & Services Instantly" />
  <meta name="twitter:description" content="India's smartest event booking platform. Discover and book trusted vendors for weddings, parties & corporate events. Launching soon!" />
  <meta name="twitter:image" content="https://mymooment.com/mymooment_logo.png" />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />

  <!-- Theme Color (for mobile browsers) -->
  <meta name="theme-color" content="#000000" />

  <!-- JSON-LD Structured Data: Organization + WebSite -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "myMooment",
          "url": "https://mymooment.com",
          "logo": "https://mymooment.com/mymooment_logo.png",
          "description": "India's smartest event booking platform. Discover and book trusted vendors for weddings, parties & corporate events.",
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "name": "myMooment",
          "url": "https://mymooment.com",
          "description": "Book event vendors and services instantly on myMooment.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://mymooment.com/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
